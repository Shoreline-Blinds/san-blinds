<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Job Status — SAN Pty Ltd</title>
<style>
:root{
  --ink:#16263a; --paper:#eaeef2; --surface:#ffffff; --line:#dbe1e8;
  --teal:#0e7c6b; --text:#1c2b3a; --dim:#657487;
  --shadow:0 1px 2px rgba(16,32,48,.06),0 8px 24px rgba(16,32,48,.06);
  --mono:ui-monospace,"SF Mono",Menlo,Consolas,"Roboto Mono",monospace;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:var(--sans);color:var(--text);background:var(--paper);font-size:15px;line-height:1.45}
.mono{font-family:var(--mono);font-variant-numeric:tabular-nums}

.top{background:var(--ink);color:#fff;padding:16px 22px;border-bottom:3px solid var(--teal);
  display:flex;align-items:center;gap:12px}
.mark{width:26px;height:26px;border-radius:6px;flex:none;
  background:repeating-linear-gradient(90deg,var(--teal) 0 3px,transparent 3px 6px),#0b6558;
  box-shadow:inset 0 0 0 2px rgba(255,255,255,.15)}
.bname{font-weight:700;font-size:15px;line-height:1.1}
.btag{font-size:12px;color:#9fb3c8}

.wrap{max-width:820px;margin:0 auto;padding:26px 18px 60px}
h1{font-size:24px;margin:0 0 2px;letter-spacing:-.3px;color:var(--ink)}
.sub{margin:0 0 20px;color:var(--dim);font-size:14px}

.card{background:var(--surface);border:1px solid var(--line);border-radius:14px;
  box-shadow:var(--shadow);overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:14.5px}
th{text-align:left;font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--dim);
  padding:13px 16px;border-bottom:1px solid var(--line);background:#f7f9fb;font-weight:700}
td{padding:13px 16px;border-bottom:1px solid #eef1f5;vertical-align:middle}
tbody tr:last-child td{border-bottom:0}
.jname{font-weight:700;color:var(--ink)}
tr.done td{color:#9aa7b4;background:#f7f9fb}
tr.done .jname{color:#9aa7b4;font-weight:600}

.badge{display:inline-block;padding:4px 11px;border-radius:999px;font-size:12.5px;font-weight:700;white-space:nowrap}
.s-grey{background:#eef1f4;color:#516072} .s-blue{background:#e4eefb;color:#215fa6}
.s-amber{background:#fbefd6;color:#996515} .s-orange{background:#fce3d4;color:#b1521f}
.s-slate{background:#e7e9f4;color:#4b4f86} .s-red{background:#fbe0e0;color:#b12a2a}
.s-green{background:#dcf3e4;color:#1d7a45}

.note{margin:18px 2px 0;color:var(--dim);font-size:12.5px}
.state{background:var(--surface);border:1px dashed var(--line);border-radius:14px;
  padding:44px 26px;text-align:center;color:var(--dim)}
.state h2{margin:0 0 8px;color:var(--ink);font-size:19px}
.spin{width:22px;height:22px;border:2.5px solid var(--line);border-top-color:var(--teal);
  border-radius:50%;margin:0 auto 12px;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* On phones, turn the table into stacked cards */
@media(max-width:560px){
  .wrap{padding:20px 12px 44px}
  thead{display:none}
  tr{display:block;border-bottom:1px solid var(--line);padding:14px 16px}
  tr:last-child{border-bottom:0}
  td{display:flex;justify-content:space-between;gap:14px;border:0;padding:4px 0}
  td::before{content:attr(data-label);color:var(--dim);font-size:12.5px;font-weight:600}
  td.jobcell{display:block;margin-bottom:6px}
  td.jobcell::before{display:none}
}
</style>
</head>
<body>
<header class="top">
  <span class="mark"></span>
  <div><div class="bname">SAN Pty Ltd</div><div class="btag">Job status</div></div>
</header>
<main class="wrap" id="main">
  <div class="state"><div class="spin"></div>Loading your jobs…</div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
(function () {
  "use strict";

  var STATUS_CLASS = {
    "Not Started": "s-grey", "In Production": "s-blue",
    "Fabric / Product on Order": "s-amber", "Delayed": "s-orange",
    "On Hold": "s-slate", "Cancelled": "s-red", "Job Complete": "s-green"
  };

  var main = document.getElementById("main");

  function esc(s) {
    return String(s == null ? "" : s).replace(/[&<>"']/g, function (m) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[m];
    });
  }
  function fmtDate(iso) {
    if (!iso) return "—";
    var d = new Date(iso + "T00:00:00");
    if (isNaN(d)) return "—";
    var p = function (x) { return (x < 10 ? "0" : "") + x; };
    return p(d.getDate()) + "/" + p(d.getMonth() + 1) + "/" + d.getFullYear();
  }
  function state(title, msg) {
    main.innerHTML = '<div class="state"><h2>' + esc(title) + '</h2><p>' + esc(msg) + '</p></div>';
  }
  function getToken() {
    var m = /[?&]c=([^&]+)/.exec(window.location.search || "");
    return m ? decodeURIComponent(m[1]) : "";
  }

  function renderJobs(name, rows) {
    var body = rows.map(function (r) {
      var done = r.job_status === "Job Complete";
      return '<tr' + (done ? ' class="done"' : '') + '>' +
        '<td class="jobcell jname">' + esc(r.job_name || "Job") + '</td>' +
        '<td data-label="Stage"><span class="badge ' + (STATUS_CLASS[r.job_status] || "s-grey") + '">' +
          esc(r.job_status || "Not Started") + '</span></td>' +
        '<td data-label="Expected completion" class="mono">' + esc(fmtDate(r.expected_completion)) + '</td>' +
        '</tr>';
    }).join("");

    main.innerHTML =
      '<h1>' + esc(name) + '</h1>' +
      '<p class="sub">' + rows.length + ' job' + (rows.length === 1 ? "" : "s") + ' with us</p>' +
      '<div class="card"><table>' +
      '<thead><tr><th>Job</th><th>Stage</th><th>Expected completion</th></tr></thead>' +
      '<tbody>' + body + '</tbody></table></div>' +
      '<p class="note">Expected completion is an estimate based on our current lead times from when ' +
      'we received the job, and allows for weekends and public holidays.<br>' +
      'For anything urgent, please contact us directly.</p>';
  }

  async function start() {
    var cfg = window.SAN_CONFIG || {};
    if (!cfg.url || !cfg.key || String(cfg.url).indexOf("PASTE_") !== -1) {
      state("Not set up yet", "This page needs its config.js file completed. Please contact SAN Pty Ltd.");
      return;
    }
    if (!window.supabase || !window.supabase.createClient) {
      state("Can’t connect", "Please check your internet connection and refresh the page.");
      return;
    }
    var token = getToken();
    if (!token) {
      state("Link incomplete", "Please use the full link supplied by SAN Pty Ltd — it should end with a long code.");
      return;
    }

    var db = window.supabase.createClient(cfg.url, cfg.key);
    try {
      var who = await db.rpc("client_portal_name", { p_token: token });
      if (who.error) throw who.error;
      if (!who.data) {
        state("Link not recognised", "This link may have been replaced. Please contact SAN Pty Ltd for an up-to-date link.");
        return;
      }
      var res = await db.rpc("client_portal_jobs", { p_token: token });
      if (res.error) throw res.error;
      var rows = res.data || [];
      if (!rows.length) {
        main.innerHTML = '<h1>' + esc(who.data) + '</h1>' +
          '<div class="state"><h2>No jobs yet</h2><p>Once a job is entered for you, it will appear here.</p></div>';
        return;
      }
      renderJobs(who.data, rows);
    } catch (e) {
      state("Something went wrong", "We couldn’t load your jobs just now. Please try again shortly.");
    }
  }

  start();
})();
</script>
</body>
</html>
