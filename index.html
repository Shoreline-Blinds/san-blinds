<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAN Pty Ltd — Blind Job Management</title>
<style>
:root{
  --ink:#16263a; --paper:#eaeef2; --surface:#ffffff; --line:#dbe1e8;
  --teal:#0e7c6b; --teal-d:#0b6558; --text:#1c2b3a; --dim:#657487;
  --amber:#b8791b; --shadow:0 1px 2px rgba(16,32,48,.06),0 8px 24px rgba(16,32,48,.06);
  --mono:ui-monospace,"SF Mono",Menlo,Consolas,"Roboto Mono",monospace;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:var(--sans);color:var(--text);background:var(--paper);font-size:15px;line-height:1.45}
button{font-family:inherit}
.mono{font-family:var(--mono);font-variant-numeric:tabular-nums}

/* top bar */
.top{display:flex;align-items:center;gap:24px;background:var(--ink);color:#fff;padding:14px 22px;
  border-bottom:3px solid var(--teal)}
.brand{display:flex;align-items:center;gap:12px}
.mark{width:26px;height:26px;border-radius:6px;background:
  repeating-linear-gradient(90deg,var(--teal) 0 3px,transparent 3px 6px),var(--teal-d);
  box-shadow:inset 0 0 0 2px rgba(255,255,255,.15)}
.bname{font-weight:700;letter-spacing:.2px;font-size:15px;line-height:1.1}
.btag{font-size:12px;color:#9fb3c8}
.nav{display:flex;gap:4px;margin-left:8px}
.navlink{background:transparent;border:0;color:#c6d4e2;padding:8px 14px;border-radius:8px;cursor:pointer;font-size:14px}
.navlink:hover{background:rgba(255,255,255,.08);color:#fff}
.navlink.on{background:rgba(255,255,255,.14);color:#fff;font-weight:600}
.topactions{margin-left:auto;display:flex;gap:8px}

/* layout */
.wrap{max-width:1080px;margin:0 auto;padding:26px 22px 60px}
.pagehead{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:18px;flex-wrap:wrap}
h1{font-size:26px;margin:0;letter-spacing:-.3px;color:var(--ink)}
.sub{margin:4px 0 0;color:var(--dim);font-size:14px}
.headctrls{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.crumbs{margin-bottom:12px}
.link{background:none;border:0;color:var(--teal);cursor:pointer;font-size:14px;padding:4px 0;font-weight:600}
.link:hover{text-decoration:underline}

/* buttons */
.btn{border:1px solid var(--line);background:#fff;color:var(--text);padding:9px 15px;border-radius:9px;
  cursor:pointer;font-size:14px;font-weight:600;transition:.12s;white-space:nowrap}
.btn:hover{border-color:#c2ccd8;box-shadow:var(--shadow)}
.btn.primary{background:var(--teal);border-color:var(--teal);color:#fff}
.btn.primary:hover{background:var(--teal-d)}
.btn.ghost{background:transparent;border-color:rgba(255,255,255,.25);color:#dbe6f0}
.btn.ghost:hover{background:rgba(255,255,255,.1)}
.btn.small{padding:6px 11px;font-size:13px}
.btn.disabled{opacity:.5;cursor:not-allowed}
.danger-ghost{color:#b13b3b;border-color:#e6cccc}
.danger-ghost:hover{background:#fbeeee;border-color:#d99}

/* cards + tables */
.card{background:var(--surface);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);overflow:hidden}
.card.pad{padding:20px}
.cardbar{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--line);gap:12px}
table.grid{width:100%;border-collapse:collapse;font-size:14px}
.grid th{text-align:left;font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--dim);
  padding:12px 14px;border-bottom:1px solid var(--line);background:#f7f9fb;font-weight:700}
.grid td{padding:11px 14px;border-bottom:1px solid #eef1f5;vertical-align:middle}
.grid tbody tr:last-child td,.grid tbody tr:last-child td{border-bottom:0}
.grid tr:hover td{background:#fafcfd}
.strong{font-weight:700;color:var(--ink)}
.dim{color:var(--dim)}
.rowact{display:flex;gap:6px;justify-content:flex-end}
td.idx,.idx{color:var(--dim);width:34px;text-align:center;font-family:var(--mono)}
.num{text-align:right}

/* status badges */
.badge{display:inline-block;padding:4px 10px;border-radius:999px;font-size:12.5px;font-weight:700;white-space:nowrap}
.s-grey{background:#eef1f4;color:#516072} .s-blue{background:#e4eefb;color:#215fa6}
.s-amber{background:#fbefd6;color:#996515} .s-orange{background:#fce3d4;color:#b1521f}
.s-slate{background:#e7e9f4;color:#4b4f86} .s-red{background:#fbe0e0;color:#b12a2a}
.s-green{background:#dcf3e4;color:#1d7a45}
select.statussel{border:0;font-weight:700;font-size:12.5px;padding:5px 8px;border-radius:999px;cursor:pointer;appearance:none;-webkit-appearance:none}
select.statussel.s-grey{background:#eef1f4;color:#516072}
select.statussel.s-blue{background:#e4eefb;color:#215fa6}
select.statussel.s-amber{background:#fbefd6;color:#996515}
select.statussel.s-orange{background:#fce3d4;color:#b1521f}
select.statussel.s-slate{background:#e7e9f4;color:#4b4f86}
select.statussel.s-red{background:#fbe0e0;color:#b12a2a}
select.statussel.s-green{background:#dcf3e4;color:#1d7a45}

/* controls */
.search{padding:9px 13px;border:1px solid var(--line);border-radius:9px;font-size:14px;width:230px;font-family:inherit}
.search:focus{outline:2px solid var(--teal);outline-offset:0;border-color:var(--teal)}
.toggle{display:flex;align-items:center;gap:7px;font-size:14px;color:var(--dim);cursor:pointer;user-select:none}
.toggle input{width:16px;height:16px;accent-color:var(--teal)}

/* job detail */
.jobhead{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin:6px 0 16px}
.tabbar{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:20px}
.tab{background:none;border:0;border-bottom:3px solid transparent;padding:11px 16px;cursor:pointer;font-size:14.5px;
  color:var(--dim);font-weight:600;margin-bottom:-1px}
.tab:hover{color:var(--ink)}
.tab.on{color:var(--teal);border-bottom-color:var(--teal)}
.formgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px 18px}
.fld{display:flex;flex-direction:column;gap:5px;font-size:13px;color:var(--dim)}
.fld span{font-weight:600}
.fld.wide{margin-top:14px}
.fld input,.fld select,.fld textarea{font-family:inherit;font-size:14.5px;color:var(--text);padding:9px 11px;
  border:1px solid var(--line);border-radius:9px;background:#fff}
.fld input:focus,.fld select:focus,.fld textarea:focus{outline:2px solid var(--teal);border-color:var(--teal)}
.fld input:disabled{background:#f4f6f8;color:var(--ink);font-weight:600}
.clientcard{margin-top:16px;padding:11px 14px;background:#f4f8f7;border:1px solid #d7e8e4;border-radius:10px;font-size:13.5px;color:#2a5049}

/* entry table */
.entry input,.entry select{width:100%;border:1px solid transparent;background:#fff;padding:8px 9px;border-radius:7px;font-family:inherit;font-size:14px}
.entry input:hover,.entry select:hover{border-color:var(--line)}
.entry input:focus,.entry select:focus{outline:2px solid var(--teal);border-color:var(--teal)}
.entry input.num{font-family:var(--mono);text-align:right}
.entryfoot{display:flex;align-items:center;justify-content:space-between;padding:14px 18px}
.count{color:var(--dim);font-size:13px;font-family:var(--mono)}
.hint{color:var(--dim);font-size:13.5px;margin:14px 2px 0}
.ruleline{margin:14px 2px 0;color:var(--dim);font-size:12.5px;font-family:var(--mono)}

/* cut list emphasis */
.cut td.strong,.cut .strong{color:var(--teal-d)}

/* labels preview */
.labelprev{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;margin-top:16px}
.label{border:1px solid var(--ink);border-radius:8px;padding:10px 12px;font-size:12.5px;background:#fff}
.lb-top{display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px solid var(--line);padding-bottom:5px;margin-bottom:6px}
.lb-co{font-weight:800;color:var(--ink)} .lb-addr{font-size:10.5px;color:var(--dim)}
.lb-ref{display:flex;justify-content:space-between;gap:8px;font-size:11.5px;color:var(--dim);margin-bottom:4px}
.lb-blind{display:flex;justify-content:space-between;margin-bottom:6px}
.lb-grid{width:100%;border-collapse:collapse;font-size:12px}
.lb-grid td{border-top:1px solid #eef1f5;padding:4px 3px}
.lb-grid td:first-child{color:var(--dim)}

/* empty states */
.empty{background:var(--surface);border:1px dashed var(--line);border-radius:14px;padding:44px;text-align:center;color:var(--dim)}
.empty h3{margin:0 0 6px;color:var(--ink)} .empty.small{padding:26px}
.nomatch{padding:22px;text-align:center;color:var(--dim)}
.foot{max-width:1080px;margin:0 auto;padding:0 22px 40px;color:var(--dim);font-size:12.5px}

/* modal */
.modal{position:fixed;inset:0;background:rgba(16,28,42,.45);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
.modal.open{display:flex}
.m-card{background:#fff;border-radius:16px;width:100%;max-width:560px;box-shadow:0 20px 60px rgba(0,0,0,.3);overflow:hidden}
.m-head{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
.m-title{font-weight:700;font-size:17px;color:var(--ink)}
.m-body{padding:22px}
.m-foot{padding:16px 22px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px}
.m-close{background:none;border:0;font-size:22px;color:var(--dim);cursor:pointer;line-height:1}

/* toast */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;
  padding:12px 20px;border-radius:10px;font-size:14px;opacity:0;pointer-events:none;transition:.25s;z-index:60;box-shadow:var(--shadow)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:640px){.formgrid{grid-template-columns:1fr}.top{gap:12px;padding:12px 14px}.btag{display:none}
  .search{width:150px}.wrap{padding:18px 14px 50px}}

/* ---------- print ---------- */
#printRoot{display:none}
@media print{
  body.printing .app{display:none!important}
  body.printing #printRoot{display:block}
  @page{margin:14mm}
  .p-head h2{margin:0 0 4px;font-size:20px}
  .p-meta{font-size:12px;color:#333;margin-bottom:14px}
  .p-grid{width:100%;border-collapse:collapse;font-size:13px}
  .p-grid th,.p-grid td{border:1px solid #333;padding:7px 9px;text-align:left}
  .p-grid th{background:#eee}
  .p-labels{display:grid;grid-template-columns:1fr 1fr;gap:8mm}
  .p-labels .label{border:1.5px solid #000;page-break-inside:avoid}
}

/* ---- shared-version additions ---- */
.top .who{color:#9fb3c8;font-size:13px;margin-right:2px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:linear-gradient(160deg,#eef2f6,#e3e9ef)}
.gatecard{background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:36px 34px;max-width:400px;width:100%;text-align:center}
.gatecard h1{margin:14px 0 4px;font-size:24px}
.gatecard p{color:var(--dim);font-size:14px;margin:6px 0}
.mark.big{width:46px;height:46px;border-radius:11px;margin:0 auto 4px}
.loginform{margin-top:20px;text-align:left;display:flex;flex-direction:column;gap:13px}
.btn.wide{width:100%;justify-content:center;padding:12px;font-size:15px}
.loginerr{color:#b12a2a;font-size:13px;min-height:15px;text-align:center}
.addholiday{display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap}
.addholiday .fld{min-width:150px}
</style>
</head>
<body>
<div class="app" id="app"></div>
<div id="printRoot"></div>
<div class="modal" id="modal"><div class="m-card">
  <div class="m-head"><span class="m-title"></span><button class="m-close">×</button></div>
  <div class="m-body"></div>
  <div class="m-foot"><button class="btn m-close">Cancel</button><button class="btn primary" data-msave>Save</button></div>
</div></div>
<div id="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* SAN Blinds — shared (multi-user) version
   Front-end hosted on GitHub Pages · data + logins in Supabase.
   All staff work off one live database. */

(function () {
  "use strict";

  /* ============================================================
     1) YOUR SETTINGS  — paste the two values from Supabase here.
        (Project Settings → API. The key is the PUBLIC anon /
        publishable key — it is safe to commit to GitHub.)
     ============================================================ */
  var SUPABASE_URL = "https://kdcomtdiyntklgsmymwf.supabase.co/rest/v1/";
  var SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtkY29tdGRpeW50a2xnc215bXdmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ2MjA1NjIsImV4cCI6MjEwMDE5NjU2Mn0.aSfPo03smVfYdGl4KIjF__nPQJU85kWeujYgJ4XwWIw";
  /* ============================================================ */

  var STATUSES = ["Not Started", "In Production", "Fabric / Product on Order",
    "Delayed", "On Hold", "Cancelled", "Job Complete"];
  var STATUS_CLASS = {
    "Not Started": "s-grey", "In Production": "s-blue",
    "Fabric / Product on Order": "s-amber", "Delayed": "s-orange",
    "On Hold": "s-slate", "Cancelled": "s-red", "Job Complete": "s-green"
  };
  var FACE_REC = ["Face / Make", "Rec / Tight"];
  var MAX_WINDOWS = 30;
  var LEAD_DAYS = 25;

  var db = null, user = null;
  var clients = [], jobs = [], holidays = [], holidaySet = {};
  var app, booted = false;

  /* ---------- helpers ---------- */
  function uid() {
    if (window.crypto && window.crypto.randomUUID) return window.crypto.randomUUID();
    return "id-" + Date.now() + "-" + Math.random().toString(16).slice(2);
  }
  function localISO(d) {
    var p = function (x) { return (x < 10 ? "0" : "") + x; };
    return d.getFullYear() + "-" + p(d.getMonth() + 1) + "-" + p(d.getDate());
  }
  function todayISO() { return localISO(new Date()); }
  function esc(s) {
    return String(s == null ? "" : s).replace(/[&<>"']/g, function (m) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[m];
    });
  }
  function num(v) { var n = Number(v); return isFinite(n) && n !== 0 ? n : null; }
  function mm(v) { return v === null || v === "" || v === undefined ? "" : v; }

  /* ---------- calculations (rules preserved) ---------- */
  function clothWidth(fr, w) {
    w = num(w); if (w === null) return null;
    if (fr === "Face / Make") return w - 26;
    if (fr === "Rec / Tight") return w - 28;
    return null;
  }
  function clothDrop(d) { d = num(d); return d === null ? null : d + 250; }
  function tubeLength(fr, w) { return clothWidth(fr, w); }
  function baserail(fr, w) { var cw = clothWidth(fr, w); return cw === null ? null : cw + 2; }

  function rebuildHolidaySet() {
    holidaySet = {};
    holidays.forEach(function (h) { if (h.day) holidaySet[h.day] = true; });
  }
  function addWorkingDays(iso, n) {
    if (!iso) return null;
    var d = new Date(iso + "T00:00:00"); if (isNaN(d)) return null;
    var added = 0;
    while (added < n) {
      d.setDate(d.getDate() + 1);
      var day = d.getDay();
      if (day !== 0 && day !== 6 && !holidaySet[localISO(d)]) added++;
    }
    return d;
  }
  function fmtDate(d) {
    if (!d) return "";
    if (typeof d === "string") { d = new Date(d + "T00:00:00"); if (isNaN(d)) return ""; }
    var p = function (x) { return (x < 10 ? "0" : "") + x; };
    return p(d.getDate()) + "/" + p(d.getMonth() + 1) + "/" + d.getFullYear();
  }

  /* ---------- data mapping ---------- */
  function toApp(r) {
    return {
      id: r.id, sanRef: r.san_ref || "", clientRef: r.client_ref || "",
      clientId: r.client_id || null, jobName: r.job_name || "",
      jobAddress: r.job_address || "", dateReceived: r.date_received || "",
      status: r.status || "Not Started", notes: r.notes || "",
      windows: Array.isArray(r.windows) ? r.windows : []
    };
  }
  var FIELD_COL = {
    sanRef: "san_ref", clientRef: "client_ref", clientId: "client_id",
    jobName: "job_name", jobAddress: "job_address", dateReceived: "date_received",
    status: "status", notes: "notes"
  };
  function getJob(id) { return jobs.filter(function (j) { return j.id === id; })[0]; }
  function getClient(id) { return clients.filter(function (c) { return c.id === id; })[0]; }
  function windowCount(job) {
    return job.windows.filter(function (w) { return (w.name || "").trim() || num(w.width); }).length;
  }
  function activeWindows(job) {
    return job.windows.filter(function (w) { return (w.name || "").trim() || num(w.width) || num(w.drop); });
  }

  /* ---------- supabase load + realtime ---------- */
  async function loadAll() {
    var res = await Promise.all([
      db.from("clients").select("*").order("name"),
      db.from("jobs").select("*").order("created_at", { ascending: false }),
      db.from("holidays").select("*").order("day")
    ]);
    if (res[0].error || res[1].error || res[2].error) {
      throw (res[0].error || res[1].error || res[2].error);
    }
    clients = res[0].data || [];
    jobs = (res[1].data || []).map(toApp);
    holidays = res[2].data || [];
    rebuildHolidaySet();
  }
  var rtSetUp = false;
  function setupRealtime() {
    if (rtSetUp) return; rtSetUp = true;
    db.channel("live")
      .on("postgres_changes", { event: "*", schema: "public", table: "jobs" }, onRemoteChange)
      .on("postgres_changes", { event: "*", schema: "public", table: "clients" }, onRemoteChange)
      .on("postgres_changes", { event: "*", schema: "public", table: "holidays" }, onRemoteChange)
      .subscribe();
  }
  var remoteT;
  function onRemoteChange() {
    clearTimeout(remoteT);
    remoteT = setTimeout(async function () {
      try { await loadAll(); } catch (e) { return; }
      var el = document.activeElement;
      var typing = el && (el.tagName === "INPUT" || el.tagName === "TEXTAREA");
      if (!typing) render();
    }, 250);
  }

  /* ---------- debounced remote writes ---------- */
  var pending = {}, patchT = {};
  function queueJobPatch(id, col, value) {
    pending[id] = pending[id] || {};
    pending[id][col] = value;
    clearTimeout(patchT[id]);
    patchT[id] = setTimeout(function () { flushJobPatch(id); }, 700);
  }
  async function flushJobPatch(id) {
    var patch = pending[id]; if (!patch) return;
    delete pending[id];
    var r = await db.from("jobs").update(patch).eq("id", id);
    if (r.error) toast("Save failed — check your connection.");
  }

  /* ============================================================
     Rendering  (same screens as the offline version)
     ============================================================ */
  function render() {
    if (!app) app = document.getElementById("app");
    if (!configured()) return renderConfigNeeded();
    if (!user) return renderLogin();
    if (state.view === "job") return renderJob();
    if (state.view === "clients") return renderClients();
    if (state.view === "holidays") return renderHolidays();
    return renderDashboard();
  }
  function configured() {
    return SUPABASE_URL.indexOf("PASTE_") === -1 && SUPABASE_KEY.indexOf("PASTE_") === -1;
  }

  var state = { view: "dashboard", jobId: null, tab: "info", clientView: false, search: "" };

  function topbar(active) {
    return '<header class="top">' +
      '<div class="brand"><span class="mark"></span><div><div class="bname">SAN Pty Ltd</div>' +
      '<div class="btag">Blind Job Management</div></div></div>' +
      '<nav class="nav">' +
      '<button class="navlink ' + (active === "dashboard" ? "on" : "") + '" data-go="dashboard">Jobs</button>' +
      '<button class="navlink ' + (active === "clients" ? "on" : "") + '" data-go="clients">Clients</button>' +
      '<button class="navlink ' + (active === "holidays" ? "on" : "") + '" data-go="holidays">Holidays</button>' +
      '</nav>' +
      '<div class="topactions">' +
      '<span class="who">' + esc(user ? user.email : "") + '</span>' +
      '<button class="btn ghost" data-action="export">Backup</button>' +
      '<button class="btn ghost" data-action="signout">Sign out</button>' +
      '</div></header>';
  }
  function badge(s) { return '<span class="badge ' + (STATUS_CLASS[s] || "s-grey") + '">' + esc(s || "Not Started") + '</span>'; }
  function footer() { return '<footer class="foot">Signed in as ' + esc(user ? user.email : "") + ' · changes save automatically and sync to all staff.</footer>'; }

  function renderConfigNeeded() {
    app.innerHTML = '<div class="gate"><div class="gatecard">' +
      '<div class="mark big"></div><h1>Almost there</h1>' +
      '<p>This app isn’t connected to your database yet. Open <b>index.html</b>, paste your Supabase <b>Project URL</b> and <b>anon key</b> into the settings block near the top, then save and refresh.</p>' +
      '<p class="dim">Full steps are in <b>SETUP-GUIDE.md</b>.</p></div></div>';
  }

  function renderLogin() {
    app.innerHTML = '<div class="gate"><div class="gatecard">' +
      '<div class="mark big"></div><h1>SAN Blinds</h1><p class="dim">Sign in to continue</p>' +
      '<div class="loginform">' +
      '<label class="fld"><span>Email</span><input id="li-email" type="email" autocomplete="username" placeholder="you@company.com"></label>' +
      '<label class="fld"><span>Password</span><input id="li-pass" type="password" autocomplete="current-password" placeholder="••••••••"></label>' +

  function renderDashboard() {
    var q = state.search.toLowerCase();
    var list = jobs.filter(function (j) {
      if (!q) return true;
      var c = getClient(j.clientId);
      return [j.sanRef, j.clientRef, j.jobName, j.jobAddress, j.status, c ? c.name : ""]
        .join(" ").toLowerCase().indexOf(q) !== -1;
    });
    var rows = list.map(function (j) {
      var c = getClient(j.clientId);
      var comp = fmtDate(addWorkingDays(j.dateReceived, LEAD_DAYS));
      if (state.clientView) {
        return '<tr><td class="strong">' + esc(j.jobName || "—") + '</td><td>' + esc(c ? c.name : "—") +
          '</td><td>' + badge(j.status) + '</td><td class="mono">' + esc(comp) + '</td></tr>';
      }
      var opts = STATUSES.map(function (s) { return '<option ' + (s === j.status ? "selected" : "") + '>' + esc(s) + '</option>'; }).join("");
      return '<tr>' +
        '<td class="mono">' + esc(j.sanRef || "") + '</td>' +
        '<td class="strong">' + esc(j.jobName || "—") + '</td>' +
        '<td>' + esc(c ? c.name : "—") + '</td>' +
        '<td class="dim">' + esc(j.jobAddress || "") + '</td>' +
        '<td><select class="statussel ' + (STATUS_CLASS[j.status] || "s-grey") + '" data-status-job="' + j.id + '">' + opts + '</select></td>' +
        '<td class="mono">' + esc(comp) + '</td>' +
        '<td class="rowact"><button class="btn small" data-edit="' + j.id + '">Edit</button>' +
        '<button class="btn small danger-ghost" data-del-job="' + j.id + '">Delete</button></td></tr>';
    }).join("");
    var head = state.clientView
      ? '<tr><th>Job</th><th>Client</th><th>Stage</th><th>Expected completion</th></tr>'
      : '<tr><th>SAN Ref</th><th>Job</th><th>Client</th><th>Address</th><th>Stage</th><th>Expected</th><th></th></tr>';
    app.innerHTML = topbar("dashboard") +
      '<main class="wrap"><div class="pagehead">' +
      '<div><h1>Jobs</h1><p class="sub">' + jobs.length + ' job' + (jobs.length === 1 ? "" : "s") + ' in the system</p></div>' +
      '<div class="headctrls">' +
      '<label class="toggle"><input type="checkbox" data-action="clientview" ' + (state.clientView ? "checked" : "") + '><span>Client view</span></label>' +
      '<input class="search" placeholder="Search jobs or clients" value="' + esc(state.search) + '" data-search>' +
      '<button class="btn primary" data-action="newjob">New job</button></div></div>' +
      (jobs.length ? '<div class="card"><table class="grid"><thead>' + head + '</thead><tbody>' + rows + '</tbody></table>' +
        (list.length ? "" : '<div class="nomatch">No jobs match “' + esc(state.search) + '”.</div>') + '</div>'
        : '<div class="empty"><h3>No jobs yet</h3><p>Create your first job to get started.</p><button class="btn primary" data-action="newjob">New job</button></div>') +

  function renderClients() {
    var rows = clients.map(function (c) {
      var n = jobs.filter(function (j) { return j.clientId === c.id; }).length;

        '<td>' + esc(c.phone || "") + '</td><td class="dim">' + esc(c.email || "") + '</td>' +
        '<td class="mono">' + n + '</td><td class="rowact">' +
        '<button class="btn small" data-edit-client="' + c.id + '">Edit</button>' +
        '<button class="btn small danger-ghost" data-del-client="' + c.id + '">Delete</button></td></tr>';
    }).join("");
    app.innerHTML = topbar("clients") + '<main class="wrap"><div class="pagehead">' +
      '<div><h1>Clients</h1><p class="sub">' + clients.length + ' client' + (clients.length === 1 ? "" : "s") + '</p></div>' +
      '<button class="btn primary" data-action="newclient">New client</button></div>' +
      (clients.length ? '<div class="card"><table class="grid"><thead><tr><th>Name</th><th>Contact</th><th>Phone</th><th>Email</th><th>Jobs</th><th></th></tr></thead><tbody>' + rows + '</tbody></table></div>'

  function renderHolidays() {
    var rows = holidays.map(function (h) {

        '<td class="rowact"><button class="btn small danger-ghost" data-del-holiday="' + h.id + '">Remove</button></td></tr>';

      '<div class="card pad"><div class="addholiday">' +

      '<label class="fld"><span>Name (optional)</span><input id="h-name" placeholder="e.g. Hobart Show Day"></label>' +

  function field(label, val, key, ph, type) {
    return '<label class="fld"><span>' + label + '</span><input type="' + (type || "text") + '" value="' +
      esc(val || "") + '" placeholder="' + esc(ph || "") + '" data-job-field="' + key + '"></label>';
  }
  function renderJob() {
    var job = getJob(state.jobId);
    if (!job) { state.view = "dashboard"; return render(); }
    var client = getClient(job.clientId);
    var tabs = [["info", "Job info"], ["windows", "Windows"], ["cloth", "Cloth cut list"], ["labels", "Labels"]];
    var tabbar = tabs.map(function (t) { return '<button class="tab ' + (state.tab === t[0] ? "on" : "") + '" data-tab="' + t[0] + '">' + t[1] + '</button>'; }).join("");
    var body = state.tab === "info" ? jobInfoTab(job, client)
      : state.tab === "windows" ? windowsTab(job)
        : state.tab === "cloth" ? clothTab(job)
          : labelsTab(job);
    app.innerHTML = topbar("dashboard") + '<main class="wrap">' +
      '<div class="crumbs"><button class="link" data-go="dashboard">← All jobs</button></div>' +
      '<div class="jobhead"><div><h1>' + esc(job.jobName || "Untitled job") + '</h1>' +
      '<p class="sub"><span class="mono">' + esc(job.sanRef || "") + '</span> · ' + esc(client ? client.name : "No client") +
      ' · ' + windowCount(job) + ' window' + (windowCount(job) === 1 ? "" : "s") + '</p></div><div>' + badge(job.status) + '</div></div>' +
      '<div class="tabbar">' + tabbar + '</div><div class="tabbody">' + body + '</div></main>';
  }
  function jobInfoTab(job, client) {
    var clientOpts = '<option value="">— select client —</option>' + clients.map(function (c) {
      return '<option value="' + c.id + '" ' + (c.id === job.clientId ? "selected" : "") + '>' + esc(c.name) + '</option>';
    }).join("");
    var statusOpts = STATUSES.map(function (s) { return '<option ' + (s === job.status ? "selected" : "") + '>' + esc(s) + '</option>'; }).join("");
    var comp = fmtDate(addWorkingDays(job.dateReceived, LEAD_DAYS));
    return '<div class="card pad"><div class="formgrid">' +
      '<label class="fld"><span>Client</span><select data-job-client>' + clientOpts + '</select></label>' +
      field("SAN reference", job.sanRef, "sanRef", "S 0000") +
      field("Client / job reference", job.clientRef, "clientRef", "J 0000") +
      field("Job name", job.jobName, "jobName", "e.g. Wilson Homes") +
      field("Job address", job.jobAddress, "jobAddress", "Delivery address") +
      field("Date received", job.dateReceived, "dateReceived", "", "date") +
      '<label class="fld"><span>Stage</span><select data-job-field="status">' + statusOpts + '</select></label>' +
      '<label class="fld"><span>Expected completion</span><input class="mono" value="' + esc(comp) + '" disabled></label>' +
      '</div><label class="fld wide"><span>Notes</span><textarea rows="3" data-job-field="notes">' + esc(job.notes || "") + '</textarea></label>' +
      (client ? '<div class="clientcard"><b>' + esc(client.name) + '</b> · ' + esc(client.contact || "") + ' · ' + esc(client.phone || "") + ' · ' + esc(client.email || "") + '</div>' : "") +
      '</div>';
  }
  function windowsTab(job) {
    var rows = job.windows.map(function (w, i) {
      var frOpts = '<option value="">—</option>' + FACE_REC.map(function (o) { return '<option ' + (o === w.faceRec ? "selected" : "") + '>' + esc(o) + '</option>'; }).join("");
      return '<tr><td class="idx">' + (i + 1) + '</td>' +
        '<td><input value="' + esc(w.name || "") + '" placeholder="Window name" data-win="' + w.id + '" data-wf="name"></td>' +
        '<td><select class="frsel" data-win="' + w.id + '" data-wf="faceRec">' + frOpts + '</select></td>' +
        '<td><input class="mono num" type="number" value="' + esc(w.width || "") + '" data-win="' + w.id + '" data-wf="width"></td>' +
        '<td><input class="mono num" type="number" value="' + esc(w.drop || "") + '" data-win="' + w.id + '" data-wf="drop"></td>' +
        '<td class="rowact"><button class="btn small danger-ghost" data-del-win="' + w.id + '">✕</button></td></tr>';
    }).join("");
    var canAdd = job.windows.length < MAX_WINDOWS;
    return '<div class="card"><table class="grid entry"><thead><tr><th class="idx">#</th><th>Window name</th><th>Face or Rec</th><th>Width (mm)</th><th>Drop (mm)</th><th></th></tr></thead><tbody>' + rows + '</tbody></table>' +
      '<div class="entryfoot"><button class="btn ' + (canAdd ? "primary" : "disabled") + '" data-action="addwin" ' + (canAdd ? "" : "disabled") + '>+ Add window</button>' +
      '<span class="count">' + job.windows.length + ' / ' + MAX_WINDOWS + ' windows</span></div></div>' +
      '<p class="hint">Pick <b>Face / Make</b> or <b>Rec / Tight</b> for every window — the cut list and labels use it to work out the cloth size.</p>';
  }
  function clothTab(job) {
    var ws = activeWindows(job);
    var rows = ws.map(function (w, i) {
      var cw = clothWidth(w.faceRec, w.width);
      return '<tr><td class="mono">' + (i + 1) + '</td><td>' + esc(w.name || "") + '</td><td>' + esc(w.faceRec || "") +
        '</td><td class="mono strong">' + mm(cw) + '</td><td class="mono">' + mm(clothDrop(w.drop)) +
        '</td><td class="mono">' + mm(tubeLength(w.faceRec, w.width)) + '</td><td class="mono">' + mm(baserail(w.faceRec, w.width)) + '</td></tr>';
    }).join("");
    var content = ws.length ? '<table class="grid cut"><thead><tr><th>#</th><th>Window</th><th>Type</th><th>Cloth width</th><th>Cloth drop</th><th>Tube length</th><th>Baserail</th></tr></thead><tbody>' + rows + '</tbody></table>'
      : '<div class="empty small"><p>No windows entered yet. Add windows on the <b>Windows</b> tab.</p></div>';
    return '<div class="card"><div class="cardbar"><div><b>Cloth cut list</b> <span class="dim">— ' + esc(job.jobName || "") + '</span></div>' +
      (ws.length ? '<button class="btn primary" data-action="print-cloth">Print cut list</button>' : "") + '</div>' + content + '</div>' +
      '<div class="ruleline">Face / Make = width − 26 · Rec / Tight = width − 28 · Cloth drop = drop + 250 · Tube = cloth width · Baserail = cloth width + 2</div>';
  }
  function labelsTab(job) {
    var ws = activeWindows(job);
    var content = ws.length ? '<div class="labelprev">' + ws.map(function (w, i) { return labelHTML(job, w, i); }).join("") + '</div>'
      : '<div class="empty small"><p>No windows entered yet. Add windows on the <b>Windows</b> tab.</p></div>';
    return '<div class="card pad"><div class="cardbar"><div><b>Labels</b> <span class="dim">— two copies per window</span></div>' +
      (ws.length ? '<button class="btn primary" data-action="print-labels">Print labels</button>' : "") + '</div>' + content + '</div>';
  }
  function labelHTML(job, w, i) {
    var cw = clothWidth(w.faceRec, w.width);
    return '<div class="label"><div class="lb-top"><span class="lb-co">SAN Pty Ltd</span><span class="lb-addr">55 Lampton Ave, Derwent Park</span></div>' +
      '<div class="lb-ref"><span class="mono">' + esc(job.clientRef || "") + '</span><span>' + esc(job.jobName || "") + '</span></div>' +
      '<div class="lb-blind"><b>Window ' + (i + 1) + '</b><span>' + esc(w.name || "") + '</span></div>' +
      '<table class="lb-grid"><tr><td>Order size</td><td class="mono">' + mm(num(w.width)) + '</td><td class="mono">' + mm(num(w.drop)) + '</td></tr>' +
      '<tr><td>Type</td><td colspan="2">' + esc(w.faceRec || "") + '</td></tr>' +
      '<tr><td>Cloth</td><td class="mono strong">' + mm(cw) + '</td><td class="mono strong">' + mm(clothDrop(w.drop)) + '</td></tr>' +
      '<tr><td>Tube / Baserail</td><td class="mono">' + mm(tubeLength(w.faceRec, w.width)) + '</td><td class="mono">' + mm(baserail(w.faceRec, w.width)) + '</td></tr></table></div>';
  }

  /* ---------- printing ---------- */
  function printRoot() { return document.getElementById("printRoot"); }
  function doPrint(html) { printRoot().innerHTML = html; document.body.classList.add("printing"); window.print(); }
  window.addEventListener("afterprint", function () { document.body.classList.remove("printing"); printRoot().innerHTML = ""; });
  function printCloth(job) {
    var client = getClient(job.clientId), ws = activeWindows(job);
    var rows = ws.map(function (w, i) {
      return '<tr><td>' + (i + 1) + '</td><td>' + esc(w.name || "") + '</td><td>' + esc(w.faceRec || "") +
        '</td><td>' + mm(clothWidth(w.faceRec, w.width)) + '</td><td>' + mm(clothDrop(w.drop)) +
        '</td><td>' + mm(tubeLength(w.faceRec, w.width)) + '</td><td>' + mm(baserail(w.faceRec, w.width)) + '</td></tr>';
    }).join("");
    doPrint('<div class="p-cut"><div class="p-head"><h2>Cloth Cut List</h2><div class="p-meta"><div><b>' + esc(job.jobName || "") + '</b></div><div>' +
      esc(client ? client.name : "") + ' · ' + esc(job.sanRef || "") + ' · ' + esc(job.clientRef || "") + '</div><div>Printed ' + fmtDate(new Date()) + '</div></div></div>' +
      '<table class="p-grid"><thead><tr><th>#</th><th>Window</th><th>Type</th><th>Cloth width</th><th>Cloth drop</th><th>Tube length</th><th>Baserail</th></tr></thead><tbody>' + rows + '</tbody></table></div>');
  }
  function printLabels(job) {
    var ws = activeWindows(job), cells = [];
    ws.forEach(function (w, i) { cells.push(labelHTML(job, w, i)); cells.push(labelHTML(job, w, i)); });
    doPrint('<div class="p-labels">' + cells.join("") + '</div>');
  }

  /* ---------- toast ---------- */
  var toastT;
  function toast(msg) {
    var el = document.getElementById("toast"); el.textContent = msg; el.classList.add("show");
    clearTimeout(toastT); toastT = setTimeout(function () { el.classList.remove("show"); }, 2800);
  }

  /* ---------- mutations ---------- */
  async function newJob() {
    var row = {
      san_ref: "", client_ref: "", client_id: clients[0] ? clients[0].id : null,
      job_name: "", job_address: "", date_received: todayISO(), status: "Not Started",
      notes: "", windows: [{ id: uid(), name: "", faceRec: "", width: "", drop: "" }]
    };
    var r = await db.from("jobs").insert(row).select().single();
    if (r.error) { toast("Could not create job."); return; }
    jobs.unshift(toApp(r.data));
    state.view = "job"; state.jobId = r.data.id; state.tab = "info"; render();
  }
  async function deleteJob(id) {
    var j = getJob(id);
    if (!j || !confirm('Delete job “' + (j.jobName || "Untitled") + '”? This cannot be undone.')) return;
    var r = await db.from("jobs").delete().eq("id", id);
    if (r.error) { toast("Delete failed."); return; }
    jobs = jobs.filter(function (x) { return x.id !== id; }); render();
  }
  async function saveWindows(job) { queueJobPatch(job.id, "windows", job.windows); }

  async function newClient() {
    var r = await db.from("clients").insert({ name: "New client" }).select().single();
    if (r.error) { toast("Could not add client."); return; }
    clients.unshift(r.data); editClientDialog(r.data.id);
  }
  function editClientDialog(id) {
    var c = getClient(id); if (!c) return;
    function cf(l, v, k) { return '<label class="fld"><span>' + l + '</span><input value="' + esc(v || "") + '" data-cf="' + k + '"></label>'; }
    openModal("Client details",
      '<div class="formgrid">' + cf("Name", c.name, "name") + cf("Contact", c.contact, "contact") +
      cf("Phone", c.phone, "phone") + cf("Email", c.email, "email") + cf("Address", c.address, "address") +
      '</div><label class="fld wide"><span>Notes</span><textarea rows="2" data-cf="notes">' + esc(c.notes || "") + '</textarea></label>',
      async function () {
        var patch = {};
        modalCollect("[data-cf]").forEach(function (o) { patch[o.k] = o.v; c[o.k] = o.v; });
        var r = await db.from("clients").update(patch).eq("id", c.id);
        if (r.error) toast("Save failed."); render();
      });
  }
  async function deleteClient(id) {
    if (jobs.some(function (x) { return x.clientId === id; })) { toast("This client has jobs — reassign or delete those first."); return; }
    if (!confirm("Delete this client?")) return;
    var r = await db.from("clients").delete().eq("id", id);
    if (r.error) { toast("Delete failed."); return; }
    clients = clients.filter(function (x) { return x.id !== id; }); render();
  }

  async function addHoliday() {
    var d = document.getElementById("h-date").value;
    var nm = document.getElementById("h-name").value;
    if (!d) { toast("Pick a date first."); return; }
    var r = await db.from("holidays").insert({ day: d, name: nm }).select().single();
    if (r.error) { toast("Could not add holiday."); return; }
    holidays.push(r.data); holidays.sort(function (a, b) { return a.day < b.day ? -1 : 1; });
    rebuildHolidaySet(); render();
  }
  async function deleteHoliday(id) {
    var r = await db.from("holidays").delete().eq("id", id);
    if (r.error) { toast("Delete failed."); return; }
    holidays = holidays.filter(function (x) { return x.id !== id; });
    rebuildHolidaySet(); render();
  }

  /* ---------- modal ---------- */
  var modalSave = null;
  function openModal(title, bodyHTML, onSave) {
    modalSave = onSave;
    var m = document.getElementById("modal");
    m.querySelector(".m-title").textContent = title;
    m.querySelector(".m-body").innerHTML = bodyHTML;
    m.classList.add("open");
  }
  function closeModal() { document.getElementById("modal").classList.remove("open"); modalSave = null; }
  function modalCollect(sel) {
    return [].slice.call(document.querySelectorAll("#modal " + sel)).map(function (el) {
      return { k: el.getAttribute("data-cf"), v: el.value };
    });
  }

  /* ---------- auth ---------- */
  async function doLogin() {
    var email = document.getElementById("li-email").value.trim();
    var pass = document.getElementById("li-pass").value;
    var errEl = document.getElementById("li-err");
    errEl.textContent = "";
    var r = await db.auth.signInWithPassword({ email: email, password: pass });
    if (r.error) { errEl.textContent = r.error.message || "Sign in failed."; return; }
    // onAuthStateChange handles the rest
  }
  async function doSignOut() { await db.auth.signOut(); }

  function exportData() {
    var data = { exported: new Date().toISOString(), clients: clients, jobs: jobs, holidays: holidays };
    var blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url; a.download = "san-blinds-backup-" + todayISO() + ".json";
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
    toast("Backup downloaded.");
  }

  /* ---------- events ---------- */
  document.addEventListener("click", function (e) {
    var t = e.target.closest("[data-go],[data-action],[data-edit],[data-del-job],[data-tab]," +
      "[data-edit-client],[data-del-client],[data-del-win],[data-del-holiday],.m-close,[data-msave]");
    if (!t) return;
    if (t.hasAttribute("data-go")) { state.view = t.getAttribute("data-go"); if (state.view === "dashboard") state.jobId = null; render(); }
    else if (t.hasAttribute("data-tab")) { state.tab = t.getAttribute("data-tab"); render(); }
    else if (t.hasAttribute("data-edit")) { state.view = "job"; state.jobId = t.getAttribute("data-edit"); state.tab = "info"; render(); }
    else if (t.hasAttribute("data-edit-client")) editClientDialog(t.getAttribute("data-edit-client"));
    else if (t.hasAttribute("data-del-job")) deleteJob(t.getAttribute("data-del-job"));
    else if (t.hasAttribute("data-del-client")) deleteClient(t.getAttribute("data-del-client"));
    else if (t.hasAttribute("data-del-holiday")) deleteHoliday(t.getAttribute("data-del-holiday"));
    else if (t.hasAttribute("data-del-win")) {
      var job = getJob(state.jobId);
      job.windows = job.windows.filter(function (x) { return x.id !== t.getAttribute("data-del-win"); });
      if (!job.windows.length) job.windows.push({ id: uid(), name: "", faceRec: "", width: "", drop: "" });
      saveWindows(job); render();
    }
    else if (t.classList.contains("m-close")) closeModal();
    else if (t.hasAttribute("data-msave")) { if (modalSave) modalSave(); closeModal(); }
    else if (t.hasAttribute("data-action")) {
      var a = t.getAttribute("data-action");
      if (a === "newjob") newJob();
      else if (a === "newclient") newClient();
      else if (a === "addwin") { var jb = getJob(state.jobId); if (jb.windows.length < MAX_WINDOWS) { jb.windows.push({ id: uid(), name: "", faceRec: "", width: "", drop: "" }); saveWindows(jb); render(); } }
      else if (a === "clientview") { state.clientView = t.checked; render(); }
      else if (a === "print-cloth") printCloth(getJob(state.jobId));
      else if (a === "print-labels") printLabels(getJob(state.jobId));
      else if (a === "addholiday") addHoliday();
      else if (a === "export") exportData();
      else if (a === "login") doLogin();
      else if (a === "signout") doSignOut();
    }
  });

  document.addEventListener("input", function (e) {
    var el = e.target;
    if (el.hasAttribute && el.hasAttribute("data-search")) { state.search = el.value; renderDashboardKeepFocus(); return; }
    var job = getJob(state.jobId); if (!job) return;
    if (el.hasAttribute("data-job-field")) {
      var f = el.getAttribute("data-job-field"); job[f] = el.value; if (FIELD_COL[f]) queueJobPatch(job.id, FIELD_COL[f], el.value);
    } else if (el.hasAttribute("data-win")) {
      var w = job.windows.filter(function (x) { return x.id === el.getAttribute("data-win"); })[0];
      if (w) { w[el.getAttribute("data-wf")] = el.value; saveWindows(job); }
    }
  });

  document.addEventListener("change", function (e) {
    var el = e.target;
    if (el.hasAttribute("data-status-job")) {
      var j = getJob(el.getAttribute("data-status-job")); if (j) { j.status = el.value; queueJobPatch(j.id, "status", el.value); render(); } return;
    }
    var job = getJob(state.jobId); if (!job) return;
    if (el.hasAttribute("data-job-client")) { job.clientId = el.value || null; queueJobPatch(job.id, "client_id", job.clientId); render(); }
    else if (el.getAttribute("data-job-field") === "status") { job.status = el.value; queueJobPatch(job.id, "status", el.value); render(); }
    else if (el.getAttribute("data-job-field") === "dateReceived") { job.dateReceived = el.value; queueJobPatch(job.id, "date_received", el.value); render(); }
    else if (el.hasAttribute("data-win") && el.getAttribute("data-wf") === "faceRec") {
      var w = job.windows.filter(function (x) { return x.id === el.getAttribute("data-win"); })[0];
      if (w) { w.faceRec = el.value; saveWindows(job); }
    }
  });

  document.addEventListener("keydown", function (e) {
    if (e.key === "Escape") closeModal();
    if (e.key === "Enter" && document.getElementById("li-pass") && !document.getElementById("modal").classList.contains("open")) {
      var lp = document.getElementById("li-pass"); if (document.activeElement === lp || document.activeElement === document.getElementById("li-email")) doLogin();
    }
  });

  function renderDashboardKeepFocus() {
    var val = state.search; render();
    var s = document.querySelector("[data-search]");
    if (s) { s.focus(); s.value = val; s.setSelectionRange(val.length, val.length); }
  }

  /* ---------- boot ---------- */
  async function initAfterLogin(session) {
    user = session.user;
    if (!booted) {
      booted = true;
      try { await loadAll(); } catch (e) { toast("Could not load data — check the database is set up."); }
      setupRealtime();
    }
    state.view = "dashboard"; render();
  }
  function boot() {
    app = document.getElementById("app");
    if (!configured()) { render(); return; }
    var lib = window.supabase;
    if (!lib || !lib.createClient) { app.innerHTML = '<div class="gate"><div class="gatecard"><h1>Offline</h1><p>Could not load the database library. Check the internet connection and refresh.</p></div></div>'; return; }
    db = lib.createClient(SUPABASE_URL, SUPABASE_KEY);
    db.auth.getSession().then(function (r) {
      if (r.data && r.data.session) initAfterLogin(r.data.session); else { user = null; render(); }
    });
    db.auth.onAuthStateChange(function (event, session) {
      if (session) initAfterLogin(session);
      else { user = null; booted = false; render(); }
    });
  }
  if (document.readyState !== "loading") boot();
  else document.addEventListener("DOMContentLoaded", boot);
})();

</script>
</body>
</html>
